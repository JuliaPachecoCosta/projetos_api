<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cães 🐾</title>
    <style>
        /* Um pouco de CSS para deixar o desafio mais bonito */
        body {
            font-family: Arial, sans-serif; /* Fonte */
            display: flex; /* transforma o body em um container flexível.*/
            flex-direction: column; /* Alinha os itens em coluna */
            align-items: center; /* Alinha os elementos no centro */
            justify-content: center; /* Alinha os elementos no centro*/
            height: 100vh; /* Define que o corpo da página tenha 100% da altura da tela */
            margin: 0; /* Retira a margem padrão */
            background-color: #f0f2f5; /* Cor de fundo */
        }

        .card {
            background: lightblue; /* Cor de fundo do card*/
            padding: 20px; /*Margem entre o conteúdo do card e as bordas */
            border-radius: 15px; /* Arredonda as bordas */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Efeito de sombra */
            text-align: center; /* texto alinhado no centro */
        }

        img {
            width: 300px; /* Comprimento da imagem */
            height: 300px; /* Altura da imagem*/
            object-fit: cover; /* Mantém a proporção da imagem sem achatar */
            border-radius: 10px; /* Arredonda as bordas */
            margin-bottom: 20px; /* Arredonda o botão*/
            border: 2px solid #ddd; /* Cor na borda da imagem*/
        }

        button {
            padding: 10px 25px; /*Altura e Largura*/
            font-size: 16px; /*Tamanho da fonte*/
            cursor: pointer; /*Faz com que o cursor do mouse vire uma mãozinha */
            background-color: #000080; /*Cor de fundo do botão */
            color: white; /* Cor do texto */
            border: none; /*Tira a borda padrão */
            border-radius: 5px; /*Arredonda a borda */
            transition: background 0.3s; /* faz com que a cor leve alguns segundo pra mudar */
        }

        button:hover {
            background-color: #1b1bc7; /*Quando o mouse passar por cima muda a cor */
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Gerador de Cães 🐶</h2>
        
        <img id="foto-cao" src="https://via.placeholder.com/300?text=Clique+para+carregar" alt="Foto de um cachorro">
        
        <br>
        
        <button id="btn-gerar">Gerar Cão</button>
    </div>

    <script>
        // 1. Mapeando os elementos do HTML
        const imgElement = document.getElementById('foto-cao');
        const btnElement = document.getElementById('btn-gerar');

        // 2. Definindo a função de busca
        function gerarDoguinho() {
            // Mudando o texto do botão para dar feedback ao usuário
            btnElement.innerText = "Carregando...";

            // Fazendo a requisição para a API
            fetch('https://dog.ceo/api/breeds/image/random') 
                .then(resposta => {
                    // Converte a resposta bruta em JSON
                    return resposta.json();
                })
                .then(dados => {
                    // Atribui a URL recebida (propriedade message) ao src da imagem
                    imgElement.src = dados.message;
                    btnElement.innerText = "Gerar Cão";
                })
                .catch(erro => {
                    console.error("Erro ao consultar a API:", erro);
                    alert("Ops! Algo deu errado ao buscar o cãozinho.");
                    btnElement.innerText = "Gerar Cão";
                });
        }

        // 3. Adicionando o "escutador" de eventos no botão
        btnElement.addEventListener('click', gerarDoguinho);
    </script>

</body>
</html>
